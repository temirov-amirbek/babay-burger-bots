version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=burger_user
      - POSTGRES_PASSWORD=burger_password
      - POSTGRES_DB=babay_burger_db
    ports:
      - "5432:5432"

  bot:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_URL=postgresql+asyncpg://burger_user:burger_password@db:5432/babay_burger_db
    restart: always

volumes:
  postgres_data:
